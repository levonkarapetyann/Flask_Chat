{% extends 'basic.html' %}

{% block title %}
Raspberry Chat
{% endblock %}

{% block body %}
<h1>Chat room: {{ room }}</h1>
<div id="msg"></div>
<form id="msg_send_form">
   <input type="text" id="msg_send" placeholder="Enter your message">
   <button type="submit">Send</button>
</form>
{% endblock %}

{% block script %}
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
   const socket = io();
   socket.on('connect', function () {
      socket.emit('join_room', {
         username: "{{ username }}",
         room: "{{ room }}"
      });

      let msg_send = document.getElementById('msg_send');
      document.getElementById('msg_send_form').onsubmit = function (e) {
          e.preventDefault();
	  let cat = msg_send.value.trim();
	  if (cat.length) {
	      socket.emit('send', {
	         username: "{{ username }}",
		 room: "{{ room }}",
		 message: cat
	      }) 
	  } 
	  msg_send.value = '';
	  msg_send.focus();
      } 
   });

   socket.on('give_msg', function (data) {
      console.log(data);
      const zametka = document.createElement('div');
      zametka.innerHTML = `<b>${data.username}:</b> ${data.message}`;
      document.getElementById('msg').appendChild(zametka);
   });

   socket.on('join_room_notification', function (data) {
      console.log(data)
      const join = document.createElement('div')
      join.innerHTML = `<b>${data.username}</b> has joined chat`
      document.getElementById('msg').appendChild(join);
   });
</script>
{% endblock %}
